version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: mindspace-frontend
    restart: always
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: mindspace-backend
    restart: always
    environment:
      - PORT=5000
      - NODE_ENV=production
    ports:
      - "5000:5000"

  nginx:
    image: nginx:alpine
    container_name: mindspace-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: mindspace-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: mindspace-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    restart: always

volumes:
  grafana_data: