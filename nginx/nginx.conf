events {}

http {
  upstream frontend {
    server frontend:80;
  }

  upstream backend {
    server backend:5000;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
    }

    location /api/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
      proxy_pass http://backend;
    }

    location /metrics {
      proxy_pass http://backend;
    }
  }
}